name: Publish albeorla-logging

on:
  push:
    tags: ["logging-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd packages/albeorla-logging && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/albeorla-logging/dist/
