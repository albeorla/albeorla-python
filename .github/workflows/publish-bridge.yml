name: Publish albeorla-claude-cli-bridge

on:
  push:
    tags: ["bridge-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build --package albeorla-claude-cli-bridge --out-dir dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
