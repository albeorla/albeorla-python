[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "albeorla-claude-cli-bridge"
version = "0.2.0"
description = "Async Python wrapper for the Claude Code CLI with session management"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "albeorla" }]
keywords = ["claude", "claude-code", "cli", "asyncio", "ai", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "albeorla-logging>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/albeorla/albeorla-python"
Repository = "https://github.com/albeorla/albeorla-python"

[tool.hatch.build.targets.wheel]
packages = ["src/claude_cli_bridge"]
